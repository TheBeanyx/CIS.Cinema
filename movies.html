<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Mozi Műsor</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #ef4444; --text: #f8fafc; --text-muted: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        h1 { margin-bottom: 30px; text-align: center; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .movie-details { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .movie-title { font-size: 1.3rem; margin-bottom: 8px; color: #fff; }
        .movie-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; }
        .btn { display: block; text-align: center; background: var(--primary); color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #dc2626; }
    </style>
</head>
<body>

<div class="container">
    <h1>CineMax Multiplex – Műsoron</h1>
    
    <div class="movie-grid">
        <div class="movie-card">
            <div class="movie-details">
                <div>
                    <h3 class="movie-title">Inception - Eredet</h3>
                    <p class="movie-meta">Sci-Fi | IMAX 2D</p>
                </div>
                <a href="movie-book.html?movie=inception" class="btn">Jegyvásárlás</a>
            </div>
        </div>
        <div class="movie-card">
            <div class="movie-details">
                <div>
                    <h3 class="movie-title">Interstellar</h3>
                    <p class="movie-meta">Sci-Fi | Digital 4K</p>
                </div>
                <a href="movie-book.html?movie=interstellar" class="btn">Jegyvásárlás</a>
            </div>
        </div>
        <div class="movie-card">
            <div class="movie-details">
                <div>
                    <h3 class="movie-title">Dune: Part Two</h3>
                    <p class="movie-meta">Kaland | VIP Terem</p>
                </div>
                <a href="movie-book.html?movie=dune2" class="btn">Jegyvásárlás</a>
            </div>
        </div>
           <div class="movie-card">
            <div class="movie-details">
                <div>
                    <h3 class="movie-title">Bogyó és Babóca</h3>
                    <p class="movie-meta">Gyerek | Gyerek terem</p>
                </div>
                <a href="movie-book.html?movie=bogyo.baboca" class="btn">Jegyvásárlás</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
