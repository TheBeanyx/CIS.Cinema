<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Beléptetés</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        .status-badge { display: inline-block; padding: 10px 20px; border-radius: 30px; font-weight: bold; margin-bottom: 20px; font-size: 1.1rem; }
        .valid { background: #10b981; color: white; }
        .voided { background: #ef4444; color: white; }
        .countdown { font-size: 1.5rem; font-weight: bold; color: #f59e0b; margin: 15px 0; font-family: monospace; }
        .info-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin-bottom: 25px; text-align: left; }
        .info-box p { margin-bottom: 10px; }
        .btn { width: 100%; background: #3b82f6; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.05rem; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 20px;">Digitális Kapu</h2>
    
    <div id="status-indicator" class="status-badge valid">Ellenőrzés...</div>

    <div class="info-box" id="info-panel" style="display: none;">
        <p><strong>Film:</strong> <span id="v-movie">-</span></p>
        <p><strong>Kezdés:</strong> <span id="v-time">-</span></p>
        <p><strong>Ülőhely:</strong> <span id="v-seat">-</span></p>
    </div>

    <div id="timer-area" style="display: none;">
        <p style="color: #94a3b8; font-size: 0.9rem;">A vetítés kezdődik:</p>
        <div class="countdown" id="countdown-clock">00:00:00</div>
    </div>

    <button class="btn" id="enter-btn" disabled>Belépés a Vetítésre</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCl7wsIHzdHcmnJSMZZCieacZROxlJnxvI",
        authDomain: "creacredit-szuper1212856.firebaseapp.com",
        projectId: "creacredit-szuper1212856",
        storageBucket: "creacredit-szuper1212856.firebasestorage.app",
        messagingSenderId: "480853534754",
        appId: "1:480853534754:web:92ea16cacdcb382659427b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const ticketId = urlParams.get('id');

    const statusIndicator = document.getElementById('status-indicator');
    const infoPanel = document.getElementById('info-panel');
    const enterBtn = document.getElementById('enter-btn');
    const timerArea = document.getElementById('timer-area');
    const countdownClock = document.getElementById('countdown-clock');

    let startTime;
    let timerTicker;

    // Szimulált kezdési időpontok a film kulcsok alapján (Teszteléshez pl. a jelenlegi időhöz képest +2 perc)
    // Valódi rendszerben ez is jöhet az adatbázisból.
    const now = new Date();
    const dynamicStartTime = new Date(now.getTime() + 15 * 1000); // 15 másodperc múlva kezdődik a teszt kedvéért

    async function checkTicket() {
        if (!ticketId) {
            statusIndicator.className = "status-badge voided";
            statusIndicator.innerText = "HIBA: Érvénytelen Jegy";
            return;
        }

        const docRef = doc(db, "tickets", ticketId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            
            document.getElementById('v-movie').innerText = data.movieName;
            document.getElementById('v-seat').innerText = data.seatId;
            
            // Beállítjuk a kezdési időpontot kijelzésre
            startTime = dynamicStartTime; 
            document.getElementById('v-time').innerText = startTime.toLocaleTimeString('hu-HU', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            
            infoPanel.style.display = "block";

            if (data.status === "Valid") {
                statusIndicator.className = "status-badge valid";
                statusIndicator.innerText = "JEGY ELFOGADVA";
                timerArea.style.display = "block";
                startCountdown();
            } else {
                statusIndicator.className = "status-badge voided";
                statusIndicator.innerText = "MÁR FELHASZNÁLT JEGY";
                enterBtn.style.display = "none";
            }
        } else {
            statusIndicator.className = "status-badge voided";
            statusIndicator.innerText = "ISMERETLEN JEGY";
        }
    }

    function startCountdown() {
        clearInterval(timerTicker);
        timerTicker = setInterval(() => {
            const currentTime = new Date().getTime();
            const distance = startTime.getTime() - currentTime;

            if (distance <= 0) {
                clearInterval(timerTicker);
                countdownClock.innerText = "A film elkezdődött!";
                countdownClock.style.color = "#10b981";
                enterBtn.disabled = false;
                enterBtn.style.background = "#10b981";
            } else {
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                countdownClock.innerText = 
                    (hours < 10 ? "0" : "") + hours + ":" + 
                    (minutes < 10 ? "0" : "") + minutes + ":" + 
                    (seconds < 10 ? "0" : "") + seconds;
            }
        }, 1000);
    }

    enterBtn.addEventListener('click', async () => {
        enterBtn.disabled = true;
        
        // Belépéskor a jegyet azonnal érvénytelenítjük a Firebase-ben, hogy ne lehessen többször belépni vele
        const docRef = doc(db, "tickets", ticketId);
        await updateDoc(docRef, {
            status: "Voided"
        });

        // Átirányítás a lejátszó felületre
        window.location.href = `movie.watch.html?id=${ticketId}`;
    });

    checkTicket();
</script>
</body>
</html>
