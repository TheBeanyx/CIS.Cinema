<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Helyfoglalás</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #ef4444; --seat-free: #64748b; --seat-selected: #10b981; --seat-occupied: #334155; --text: #f8fafc; --text-muted: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); position: relative; }
        
        .movie-header { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--primary); }
        .timer-box { position: absolute; top: 30px; right: 30px; background: #ef4444; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; display: none; }
        
        .screen-container { display: flex; flex-direction: column; align-items: center; margin: 30px 0; }
        .screen { width: 80%; height: 8px; background: white; border-radius: 50%; box-shadow: 0 6px 20px rgba(255,255,255,0.4); margin-bottom: 20px; }
        .seating-map { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; max-width: 500px; }
        .seat { width: 35px; height: 35px; background: var(--seat-free); border-radius: 6px 6px 0 0; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        .seat.selected { background: var(--seat-selected); box-shadow: 0 0 10px var(--seat-selected); }
        .seat.occupied { background: var(--seat-occupied); cursor: not-allowed; color: #475569; }
        
        .ticket-types { margin-top: 25px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; display: none; }
        .ticket-type-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ticket-type-row input { width: 60px; padding: 5px; background: #334155; border: 1px solid #475569; color: white; border-radius: 4px; text-align: center; }

        .legend { display: flex; justify-content: center; gap: 20px; list-style: none; margin-top: 20px; font-size: 0.9rem; }
        .legend li { display: flex; align-items: center; gap: 8px; }
        .summary-box { border-top: 1px solid #334155; padding-top: 20px; margin-top: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px 28px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:hover { background: #dc2626; }
        .btn:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="timer-box" id="timer">Idő: 60s</div>
    
    <div class="movie-header">
        <h2 id="active-movie-title">Film betöltése...</h2>
        <p id="active-movie-meta" style="color: var(--text-muted); font-size: 0.9rem;"></p>
    </div>

    <div class="screen-container">
        <div class="screen"></div>
        <p style="font-size: 0.8rem; color: var(--text-muted); letter-spacing: 2px;">VÁSZON</p>
        <div class="seating-map" id="map"></div>
    </div>

    <ul class="legend">
        <li><div class="seat"></div> Szabad</li>
        <li><div class="seat selected"></div> Kiválasztott</li>
        <li><div class="seat occupied"></div> Foglalt</li>
    </ul>

    <div class="ticket-types" id="ticket-types-panel">
        <h4 style="margin-bottom: 10px;">Jegytípusok beállítása:</h4>
        <div class="ticket-type-row">
            <span>Felnőtt jegy (2500 Ft)</span>
            <input type="number" id="type-adult" min="0" value="0">
        </div>
        <div class="ticket-type-row">
            <span>Diák / Nyugdíjas jegy (2000 Ft)</span>
            <input type="number" id="type-student" min="0" value="0">
        </div>
    </div>

    <div class="summary-box">
        <div>
            <p id="summary-seats">Kiválasztott székek: -</p>
            <p id="summary-price" style="font-size: 1.2rem; font-weight: bold; color: #10b981; margin-top: 5px;">0 Ft</p>
        </div>
        <button class="btn" id="next-btn" disabled>Tovább a fizetéshez</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCl7wsIHzdHcmnJSMZZCieacZROxlJnxvI",
        authDomain: "creacredit-szuper1212856.firebaseapp.com",
        projectId: "creacredit-szuper1212856",
        storageBucket: "creacredit-szuper1212856.firebasestorage.app",
        messagingSenderId: "480853534754",
        appId: "1:480853534754:web:92ea16cacdcb382659427b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Film adatbázis lokálisan az URL azonosításhoz
    const movieDatabase = {
        "inception": { title: "Inception - Eredet (IMAX 2D)", meta: "Terem: 3. terem | Időpont: 19:45" },
        "interstellar": { title: "Interstellar (Digital 4K)", meta: "Terem: 1. terem | Időpont: 21:00" },
        "dune2": { title: "Dune: Part Two (VIP)", meta: "Terem: VIP terem | Időpont: 18:00" }
    };

    // URL paraméter kiolvasása (?movie=inception)
    const urlParams = new URLSearchParams(window.location.search);
    const movieKey = urlParams.get('movie') || 'inception'; 
    const currentMovie = movieDatabase[movieKey];

    document.getElementById('active-movie-title').innerText = currentMovie.title;
    document.getElementById('active-movie-meta').innerText = currentMovie.meta;

    const mapContainer = document.getElementById('map');
    const nextBtn = document.getElementById('next-btn');
    const timerBox = document.getElementById('timer');
    const adultInput = document.getElementById('type-adult');
    const studentInput = document.getElementById('type-student');

    let selectedSeats = [];
    let timeLeft = 60;
    let timerInterval;

    function startTimer() {
        timerBox.style.display = "block";
        clearInterval(timerInterval);
        timeLeft = 60;
        timerBox.innerText = `Idő: ${timeLeft}s`;
        
        timerInterval = setInterval(() => {
            timeLeft--;
            timerBox.innerText = `Idő: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("A foglalási idő lejárt! Kérjük, válaszd ki újra a helyeket.");
                window.location.reload();
            }
        }, 1000);
    }

    async function loadHall() {
        mapContainer.innerHTML = '';
        const occupiedSeats = new Set();
        
        try {
            const querySnapshot = await getDocs(collection(db, "tickets"));
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if (data.movieKey === movieKey && data.status !== "Voided") {
                    occupiedSeats.add(data.seatId);
                }
            });
        } catch (e) {
            console.error(e);
        }

        for (let r = 1; r <= 6; r++) {
            for (let c = 1; c <= 10; c++) {
                const seatId = `${r}-${c}`;
                const seat = document.createElement('div');
                seat.classList.add('seat');
                seat.innerText = seatId;

                if (occupiedSeats.has(seatId)) {
                    seat.classList.add('occupied');
                } else {
                    seat.addEventListener('click', () => {
                        if (selectedSeats.length === 0) startTimer(); // Első kattintásra indul a kosár-időzítő
                        
                        seat.classList.toggle('selected');
                        if (seat.classList.contains('selected')) {
                            selectedSeats.push(seatId);
                        } else {
                            selectedSeats = selectedSeats.filter(s => s !== seatId);
                        }
                        
                        // Automatikusan igazítjuk a jegytípus darabszámát a székekhez
                        adultInput.value = selectedSeats.length;
                        studentInput.value = 0;
                        
                        updateUI();
                    });
                }
                mapContainer.appendChild(seat);
            }
        }
    }

    function calculatePrice() {
        const adultCount = parseInt(adultInput.value) || 0;
        const studentCount = parseInt(studentInput.value) || 0;
        return (adultCount * 2500) + (studentCount * 2000);
    }

    function updateUI() {
        const totalTicketsNeeded = selectedSeats.length;
        document.getElementById('ticket-types-panel').style.display = totalTicketsNeeded > 0 ? "block" : "none";
        document.getElementById('summary-seats').innerText = totalTicketsNeeded > 0 ? `Kiválasztott székek: ${selectedSeats.join(', ')}` : "Kiválasztott székek: -";
        
        // Ellenőrzés, hogy a jegytípusok összege egyezik-e a székek számával
        const currentTotalInputs = (parseInt(adultInput.value) || 0) + (parseInt(studentInput.value) || 0);
        
        document.getElementById('summary-price').innerText = calculatePrice().toLocaleString() + " Ft";
        nextBtn.disabled = totalTicketsNeeded === 0 || currentTotalInputs !== totalTicketsNeeded;
    }

    [adultInput, studentInput].forEach(input => {
        input.addEventListener('input', () => {
            // Nem engedjük, hogy több jegyet osszanak szét, mint ahány széket választottak
            const totalTicketsNeeded = selectedSeats.length;
            const currentTotal = (parseInt(adultInput.value) || 0) + (parseInt(studentInput.value) || 0);
            if (currentTotal > totalTicketsNeeded) {
                input.value = Math.max(0, input.value - (currentTotal - totalTicketsNeeded));
            }
            updateUI();
        });
    });

    nextBtn.addEventListener('click', () => {
        sessionStorage.setItem('booking_movie_key', movieKey);
        sessionStorage.setItem('booking_movie_name', currentMovie.title);
        sessionStorage.setItem('booking_seats', JSON.stringify(selectedSeats));
        sessionStorage.setItem('booking_total_price', calculatePrice());

        const fakeTxId = "TX-" + Math.floor(100000 + Math.random() * 900000);
        window.location.href = `payment.html?id=${fakeTxId}`;
    });

    loadHall();
</script>
</body>
</html>
