                        await addDoc(collection(db, "showtimes"), {
                            movieKey: movie.movieKey,
                            movieName: movie.movieName,
                            room: movie.room,
                            date: realDate,
                            time: timeStr
                        });
                        successfulInserts++;
                        status.innerText = `Feltöltve: ${successfulInserts} időpont...`;
                    }
                }
            }
            status.style.color = "#10b981";
            status.innerText = `Siker! Összesen ${successfulInserts} vetítési időpont sikeresen feltöltve a Firebase-be!`;
        } catch (error) {
            console.error(error);
            status.style.color = "#ef4444";
            status.innerText = "Hiba történt a feltöltés során. Ellenőrizd a konzolt!";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
