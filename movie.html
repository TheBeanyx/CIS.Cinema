<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Műsortáblázat</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #ef4444; --text: #f8fafc; --text-muted: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        h1 { text-align: center; margin-bottom: 25px; }
        .selector-box { margin-bottom: 30px; text-align: center; }
        select { background: #334155; color: white; border: 1px solid #475569; padding: 12px 20px; border-radius: 8px; font-size: 1.1rem; width: 100%; max-width: 400px; outline: none; cursor: pointer; }
        
        .schedule-table-wrapper { display: none; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; background: rgba(0,0,0,0.15); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #f59e0b; font-weight: bold; }
        tr:last-child td { border-bottom: none; }
        
        .time-link { display: inline-block; background: #475569; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.9rem; margin-right: 8px; transition: 0.2s; }
        .time-link:hover { background: var(--primary); transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <h1>Mozi Műsortáblázat</h1>
    
    <div class="selector-box">
        <label style="display:block; margin-bottom: 10px; color: var(--text-muted);">Válasszon egy filmet a műsorrend megtekintéséhez:</label>
        <select id="movie-picker">
            <option value="" disabled selected>-- Válasszon filmet --</option>
            <option value="dune2">Dune: Part Two</option>
            <option value="inception">Inception - Eredet</option>
            <option value="interstellar">Interstellar</option>
        </select>
    </div>

    <div class="schedule-table-wrapper" id="table-wrapper">
        <h3 id="selected-movie-title" style="margin-bottom: 15px; color: #fff;"></h3>
        <table>
            <thead>
                <tr>
                    <th>Dátum</th>
                    <th>Terem</th>
                    <th>Időpont (Foglalás)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCl7wsIHzdHcmnJSMZZCieacZROxlJnxvI",
        authDomain: "creacredit-szuper1212856.firebaseapp.com",
        projectId: "creacredit-szuper1212856",
        storageBucket: "creacredit-szuper1212856.firebasestorage.app",
        messagingSenderId: "480853534754",
        appId: "1:480853534754:web:92ea16cacdcb382659427b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const moviePicker = document.getElementById('movie-picker');
    const tableWrapper = document.getElementById('table-wrapper');
    const selectedMovieTitle = document.getElementById('selected-movie-title');
    const tableBody = document.getElementById('table-body');

    moviePicker.addEventListener('change', async () => {
        const movieKey = moviePicker.value;
        selectedMovieTitle.innerText = moviePicker.options[moviePicker.selectedIndex].text + " (Műsor)";
        tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Betöltés a Firebase-ből...</td></tr>';
        tableWrapper.style.display = "block";

        try {
            // Lekérjük a 'showtimes' kollekcióból a filmhez tartozó vetítéseket
            const q = query(collection(db, "showtimes"), where("movieKey", "==", movieKey));
            const querySnapshot = await getDocs(q);
            
            tableBody.innerHTML = '';

            if (querySnapshot.empty) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: #ef4444;">Nincs aktív vetítés kiírva ehhez a filmhez.</td></tr>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const tr = document.createElement('tr');
                
                // 1. Dátum oszlop (Pl: 2026-06-02)
                const tdDate = document.createElement('td');
                tdDate.innerHTML = `<strong>${data.date}</strong>`;
                
                // 2. Terem oszlop
                const tdRoom = document.createElement('td');
                tdRoom.innerText = data.room || "Normál Terem";
                
                // 3. Időpont linkként
                const tdTime = document.createElement('td');
                const a = document.createElement('a');
                a.classList.add('time-link');
                // Továbbadjuk a pontos dátumot és időt a foglalási oldalnak
                a.href = `movie-book.html?movie=${movieKey}&date=${data.date}&time=${data.time}`;
                a.innerText = data.time;
                
                tdTime.appendChild(a);
                tr.appendChild(tdDate);
                tr.appendChild(tdRoom);
                tr.appendChild(tdTime);
                tableBody.appendChild(tr);
            });

        } catch (error) {
            console.error("Hiba a vetítések lekérésekor:", error);
            tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color: #ef4444;">Szerver hiba történt az adatok betöltésekor.</td></tr>';
        }
    });
</script>
</body>
</html>
