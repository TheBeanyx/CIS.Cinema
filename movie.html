<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Műsorajánló</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --primary: #ef4444; 
            --text: #f8fafc; 
            --text-muted: #94a3b8; 
            --accent: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        
        h1 { text-align: center; margin-bottom: 10px; font-size: 2.3rem; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; }

        /* Kereső és szűrő sáv */
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; background: var(--card); padding: 20px; border-radius: 12px; }
        .search-box input { width: 100%; background: #334155; color: white; border: 1px solid #475569; padding: 12px 20px; border-radius: 8px; font-size: 1rem; outline: none; }
        .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { background: #334155; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); }

        /* Egymás alatti lista elrendezés */
        .movies-list { display: flex; flex-direction: column; gap: 12px; }
        
        /* Kis kártya alaphelyzetben */
        .movie-card { background: var(--card); border-radius: 8px; padding: 15px 20px; cursor: pointer; transition: all 0.3s ease; border: 1px solid #334155; display: flex; flex-direction: column; }
        .movie-card:hover { border-color: #64748b; background: #24324d; }
        
        .movie-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .movie-title { font-size: 1.15rem; font-weight: bold; color: #fff; }
        .movie-meta { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

        /* NAGY KIEMELT MEGJELENÉS KATTINTÁSKOR */
        .movie-card.active { 
            background: #1e293b; 
            border-color: var(--primary); 
            padding: 30px; 
            border-radius: 16px;
            cursor: default;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 15px 0;
        }
        .movie-card.active .movie-header { border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        .movie-card.active .movie-title { font-size: 1.8rem; color: var(--primary); }
        .movie-card.active .movie-meta { font-size: 1rem; color: var(--accent); }

        /* Lenyíló nagy panel (Műsorrend táblázat) */
        .schedule-panel { display: none; width: 100%; overflow-x: auto; }
        .movie-card.active .schedule-panel { display: block; }

        /* Designos táblázat a nagy kártyában */
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; margin-top: 10px; }
        th, td { padding: 14px; border-bottom: 1px solid #334155; }
        th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        
        .time-btn-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .time-link { background: #475569; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.85rem; transition: 0.2s; }
        .time-link:hover { background: var(--primary); }
        
        .loading-text { text-align: center; padding: 15px; color: var(--text-muted); font-style: italic; }
        .no-show { text-align: center; padding: 15px; color: var(--primary); }
    </style>
</head>

    // LISTASOROK GENERÁLÁSA
    function renderMovies() {
        container.innerHTML = '';
        
        const filtered = staticMovies.filter(movie => {
            const matchesFilter = currentFilter === 'all' || movie.cat === currentFilter;
            const matchesSearch = movie.name.toLowerCase().includes(currentSearch.toLowerCase());
            return matchesFilter && matchesSearch;
        });

        filtered.forEach(movie => {
            const card = document.createElement('div');
            card.classList.add('movie-card');
            
            card.innerHTML = `
                <div class="movie-header">
                    <div class="movie-title">${movie.name}</div>
                    <div class="movie-meta">${movie.label}</div>
                </div>
                <div class="schedule-panel" id="panel-${movie.key}">
                    <div class="loading-text">Vetítések betöltése a szerverről...</div>
                </div>
            `;
            
            // Nagyobb kijelzésre váltás kattintáskor
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('time-link')) return;

                const isActive = card.classList.contains('active');
                
                // Visszazárjuk a többit a letisztult formába
                document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));
                
                if (!isActive) {
                    card.classList.add('active');
                    loadShowtimes(movie.key, `panel-${movie.key}`);
                }
            });

            container.appendChild(card);
        });
    }

    // FIREBASE FOGLALÁSI TÁBLÁZAT BETÖLTÉSE
    async function loadShowtimes(movieKey, panelId) {
        const panel = document.getElementById(panelId);
        
        try {
            const q = query(collection(db, "showtimes"), where("movieKey", "==", movieKey));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                panel.innerHTML = `<div class="no-show">Jelenleg nincs aktív vetítési időpont kiírva.</div>`;
                return;
            }

            const scheduleMap = {};
            
            querySnapshot.forEach(doc => {
                const data = doc.data();
                const groupKey = `${data.date}_${data.room || "Normál Terem"}`;
                
                if (!scheduleMap[groupKey]) {
                    scheduleMap[groupKey] = {
                        date: data.date,
                        room: data.room || "Normál Terem",
                        times: []
                    };
                }
                if (!scheduleMap[groupKey].times.includes(data.time)) {
                    scheduleMap[groupKey].times.push(data.time);
                }
            });

            Object.keys(scheduleMap).forEach(k => scheduleMap[k].times.sort());

            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Dátum</th>
                            <th>Terem</th>
                            <th>Időpontok (Kattintson a foglaláshoz)</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            Object.values(scheduleMap).forEach(item => {
                let timeButtons = '';
                item.times.forEach(t => {
                    timeButtons += `<a href="movie-book.html?movie=${movieKey}&date=${item.date}&time=${t}" class="time-link">${t}</a>`;
                });

                tableHtml += `
                    <tr>
                        <td><strong>${item.date}</strong></td>
                        <td>${item.room}</td>
                        <td><div class="time-btn-container">${timeButtons}</div></td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            panel.innerHTML = tableHtml;

        } catch (error) {
            console.error("Hiba:", error);
            panel.innerHTML = `<div class="no-show">Szerver hiba történt az adatok lekérésekor.</div>`;
        }
    }

    // KERESŐ ÉS SZŰRŐ PARANCSOK
    searchInput.addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderMovies();
    });

    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            filterButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderMovies();
        });
    });

    renderMovies();
