<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax - Műsorajánló és Kereső</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --primary: #ef4444; 
            --primary-hover: #dc2626;
            --text: #f8fafc; 
            --text-muted: #94a3b8; 
            --accent: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1200px; }
        
        h1 { text-align: center; margin-bottom: 10px; font-size: 2.5rem; letter-spacing: 1px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 40px; }

        /* Kereső és szűrő sáv */
        .controls { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .search-box { flex: 1; min-width: 250px; }
        .search-box input { width: 100%; background: #334155; color: white; border: 1px solid #475569; padding: 12px 20px; border-radius: 8px; font-size: 1rem; outline: none; }
        .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { background: #334155; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary); }

        /* Film rács elrendezés */
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* Film Kártya stílus */
        .movie-card { background: var(--card); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; border: 1px solid #334155; display: flex; flex-direction: column; }
        .movie-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(239, 68, 68, 0.15); border-color: #475569; }
        
        /* Kártya dekorációs kép-helyettesítő */
        .movie-thumb { height: 140px; background: linear-gradient(135deg, #1e1b4b, #311042); display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
        .movie-thumb::after { content: '🎬'; }
        .movie-card[data-cat="mese"] .movie-thumb { background: linear-gradient(135deg, #1e3a8a, #0d9488); }
        .movie-card[data-cat="mese"] .movie-thumb::after { content: '🧸'; }
        .movie-card[data-cat="animacio"] .movie-thumb { background: linear-gradient(135deg, #b45309, #be123c); }
        .movie-card[data-cat="animacio"] .movie-thumb::after { content: '🐉'; }
        
        .movie-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .movie-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 8px; color: #fff; }
        .movie-meta { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Lenyíló panel (Műsorrend) */
        .schedule-panel { display: none; background: #0f172a; border-top: 1px solid #334155; padding: 20px; overflow-x: auto; }
        .movie-card.active .schedule-panel { display: block; }

        /* Designos táblázat */
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
        th, td { padding: 12px; border-bottom: 1px solid #1e293b; }
        th { color: var(--accent); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        
        .time-btn-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .time-link { background: #334155; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.85rem; transition: 0.2s; }
        .time-link:hover { background: var(--primary); }
        
        .loading-text { text-align: center; padding: 20px; color: var(--text-muted); font-style: italic; }
        .no-show { text-align: center; padding: 20px; color: var(--primary); font-size: 0.9rem; }
    </style>
</head>

    let currentFilter = 'all';
    let currentSearch = '';

    // RÁCS ÉS KÁRTYÁK GENERÁLÁSA
    function renderMovies() {
        container.innerHTML = '';
        
        const filtered = staticMovies.filter(movie => {
            const matchesFilter = currentFilter === 'all' || movie.cat === currentFilter;
            const matchesSearch = movie.name.toLowerCase().includes(currentSearch.toLowerCase());
            return matchesFilter && matchesSearch;
        });

        filtered.forEach(movie => {
            const card = document.createElement('div');
            card.classList.add('movie-card');
            card.setAttribute('data-cat', movie.cat);
            
            card.innerHTML = `
                <div class="movie-thumb"></div>
                <div class="movie-info">
                    <div class="movie-title">${movie.name}</div>
                    <div class="movie-meta">${movie.label}</div>
                </div>
                <div class="schedule-panel" id="panel-${movie.key}">
                    <div class="loading-text">Vetítések betöltése...</div>
                </div>
            `;
            
            // Kártya kattintás esemény (Lenyitás és Firebase lekérés)
            card.addEventListener('click', (e) => {
                // Megakadályozzuk, hogy a belső linkekre kattintás újra bezárja a panelt
                if(e.target.classList.contains('time-link')) return;

                const isActive = card.classList.contains('active');
                
                // Összes többi kártya bezárása
                document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('active'));
                
                if (!isActive) {
                    card.classList.add('active');
                    loadShowtimes(movie.key, `panel-${movie.key}`);
                }
            });

            container.appendChild(card);
        });
    }

    // FIREBASE IDŐPONTOK LEKÉRÉSE DINAMIKUSAN A LENYÍLÓ PANELBE
    async function loadShowtimes(movieKey, panelId) {
        const panel = document.getElementById(panelId);
        
        try {
            const q = query(collection(db, "showtimes"), where("movieKey", "==", movieKey));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                panel.innerHTML = `<div class="no-show">Jelenleg nincs aktív vetítési időpont ehhez a filmhez.</div>`;
                return;
            }

            // Adatok rendezése és csoportosítása dátum + terem szerint
            const scheduleMap = {};
            
            querySnapshot.forEach(doc => {
                const data = doc.data();
                const groupKey = `${data.date}_${data.room || "Normál Terem"}`;
                
                if (!scheduleMap[groupKey]) {
                    scheduleMap[groupKey] = {
                        date: data.date,
                        room: data.room || "Normál Terem",
                        times: []
                    };
                }
                if (!scheduleMap[groupKey].times.includes(data.time)) {
                    scheduleMap[groupKey].times.push(data.time);
                }
            });

            // Időpontok sorbarendezése csoporton belül
            Object.keys(scheduleMap).forEach(k => scheduleMap[k].times.sort());

            // Táblázat felépítése
            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Dátum</th>
                            <th>Terem</th>
                            <th>Időpontok (Foglalás)</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            Object.values(scheduleMap).forEach(item => {
                let timeButtons = '';
                item.times.forEach(t => {
                    timeButtons += `<a href="movie-book.html?movie=${movieKey}&date=${item.date}&time=${t}" class="time-link">${t}</a>`;
                });

                tableHtml += `
                    <tr>
                        <td><strong>${item.date}</strong></td>
                        <td>${item.room}</td>
                        <td><div class="time-btn-container">${timeButtons}</div></td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            panel.innerHTML = tableHtml;

        } catch (error) {
            console.error("Hiba:", error);
            panel.innerHTML = `<div class="no-show">Szerver hiba az adatok betöltésekor.</div>`;
        }
    }

    // KERESŐ ÉS SZŰRŐ ESEMÉNYKEZELŐK
    searchInput.addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderMovies();
    });

    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            filterButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderMovies();
        });
    });

    // Kezdő futtatás: összes film kirajzolása
    renderMovies();
</script>
